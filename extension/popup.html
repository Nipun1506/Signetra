<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 250px; padding: 16px; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0A0E1A; color: white; }
    h2 { margin-top: 0; font-size: 18px; color: #3B82F6; }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 14px; color: #94A3B8; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #22C55E; box-shadow: 0 0 8px #22C55E; }
    .setting { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #1E2535; transition: .4s; border-radius: 24px; border: 1px solid rgba(255,255,255,0.08); }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #3B82F6; }
    input:checked + .slider:before { transform: translateX(20px); }
  </style>
</head>
<body>
  <h2>SIGNETRA Overlay</h2>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Working</span>
  </div>
  <div class="setting">
    <span>Enable Overlay</span>
    <label class="switch">
      <input type="checkbox" id="toggleEnabled" checked>
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
